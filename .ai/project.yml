# .ai/project.yml
# ══════════════════════════════════════════════════════════════
# SINGLE SOURCE OF TRUTH for AI agent context generation.
#
# This file contains ONLY what cannot be extracted from code:
#   - Project identity and paradigm
#   - Hard constraints (the engineering rules)
#   - Known bugs and tech debt
#   - Branding requirements
#   - Script behavioral categories
#
# Everything else (image versions, script inventory, .env variables,
# directory structure, boot sequences) is EXTRACTED from the actual
# codebase by generate.sh. If this file disagrees with the code,
# the code wins — and validate.sh will flag the mismatch.
#
# Maintenance: Update this file when constraints CHANGE (not when
# code changes — the generator handles that automatically).
# ══════════════════════════════════════════════════════════════

project:
  name: "R-studioConf"
  version: "3.0.0"
  owner: "JFS — IT Officer (Funzionario Tecnico Informatico), BiGeA, Università di Bologna"
  paradigm: "Pessimistic System Engineering"
  paradigm_definition: "Assume failure. Bound all resources. Verify all trust chains. Fail fast on misconfiguration."
  # Never assume happy path. Handle every failure mode explicitly.

  # Research context
  department: "BiGeA — Biological, Geological and Environmental Sciences"
  university: "Alma Mater Studiorum — Università di Bologna"
  research_group: "BIOME — Biodiversity & MacroEcology"
  funded_projects:
    - "PNRR LifeWatch-Plus"
    - "PON LifeWatch-Plus"
    - "Life4Pollinators"

# ──────────────────────────────────────────────────────────────
# ENGINEERING ETHOS
# Codified posture for every AI agent acting on this repo.
# Rendered as a 1-line headline in every IDE rule file.
# ──────────────────────────────────────────────────────────────
engineering_ethos:
  stance: "Honest, not optimistic. Production-grade system engineering."
  one_liner: "ETHOS: Honest > optimistic. Pessimistic defaults. T1 (host) authoritative & continuously fixed; T2/T3 mirror T1. Smallest blast radius. Surface contradictions, never silently align."
  principles:
    - "State unknowns as unknowns; never invent confidence."
    - "Pessimistic defaults: assume failure, bound resources, fail fast."
    - "T1 (host) is authoritative and continuously fixed. Every fix originates or is mirrored in T1 first, then ported forward to T2 (docker) and T3 (k8s). T2/T3 must never silently diverge from T1 behavior; recorded deviations only (see tier_deltas)."
    - "Prefer boring, battle-tested community-reputable tools over novelty."
    - "Smallest blast radius: change the minimum that satisfies the requirement."
    - "If a rule and the code disagree, surface the contradiction; do not silently align one to the other."

# ──────────────────────────────────────────────────────────────
# DEPLOYMENT TIERS (T1 → T2 → T3)
# Three concurrent deployment surfaces with different maturity.
# Fix-promotion is unidirectional: T1 first, then forward.
# ──────────────────────────────────────────────────────────────
deployment_tiers:
  - id: "T1_host"
    status: "AUTHORITATIVE_CONTINUOUSLY_FIXED"
    role: "Authoritative source of truth. Stability is achieved by continuous bug-fixing here, not by freezing. All host files (scripts, lib, templates including Rprofile_site.d/, configs) are in scope for fixes."
    entry: "init.sh → r_env_manager.sh → scripts/NN_*.sh"
    in_scope_for_fixes:
      - "scripts/*.sh (numbered + 99_* diagnostics + tools/*)"
      - "lib/common_utils.sh"
      - "r_env_manager.sh, init.sh"
      - "templates/** (incl. Rprofile_site.d/, Renviron, motd, audit)"
      - "config/*.vars.conf"
    invariants:
      - "lib_common_utils.sh sourced by every numbered script"
      - "numbered_script_order: 01..03 → 10/11 → 12 → 13 → 15 → 20/21 → 30..32 → 40 → 50"
      - "modular Rprofile_site.d/ ordering preserved (05/45/50/55/60)"
      - "BLAS = libopenblas0-serial (NOT pthread; SIGSEGV)"
      - "Large R temp = /Rtmp (400GB ext4); never /tmp"
      - "SSSD XOR Samba (10_join_domain_sssd.sh OR 11_join_domain_samba.sh, never both)"

  - id: "T2_docker"
    status: "MIGRATION_IN_PROGRESS"
    role: "Containerize T1 incrementally. Must mirror T1 behavior; recorded deviations only."
    entry: "docker-deploy/deploy.sh → docker compose"
    derivation_rule: "Mirrors T1 behavior. Any deviation from T1 must be listed in tier_deltas with rationale."
    inherits_constraints:
      [
        "HC-01",
        "HC-02",
        "HC-03",
        "HC-04",
        "HC-05",
        "HC-06",
        "HC-07",
        "HC-08",
        "HC-09",
        "HC-10",
        "HC-11",
        "HC-12",
        "HC-13",
        "HC-14",
      ]

    open_gaps:
      - "deploy.sh used set -e only (HC-03 fix: set -euo pipefail) — fixed 2026-05-09"
      - "missing scripts/validate_deployment.sh referenced by deploy.sh — added stub 2026-05-09"
      - "Dockerfile bases unpinned (HC-07 external-image rule) — pinned to semver 2026-05-09"
      - "oauth2-proxy and docker-socket-proxy lack healthcheck — deferred (needs runtime test)"

  - id: "T3_k8s"
    status: "SKELETON_NOT_READY"
    role: "Future. Adopt only after T2 fully mirrors T1."
    entry: "kubernetes-deploy/scripts/deploy_k8s.sh"
    derivation_rule: "Mirrors T2 (which mirrors T1). Any deviation from T1/T2 must be listed in tier_deltas with rationale."
    blockers:
      - "missing kubernetes-deploy/env/.env.example (referenced by deploy_k8s.sh) — added stub 2026-05-09"
      - "no NetworkPolicy / no PodDisruptionBudget / no HPA / no PSA labels"
      - "no StorageClass for /Rtmp 400GB ext4 (NIMBLE workloads)"
      - "no SSSD/Samba sidecar strategy (host AD integration)"
      - "no PKI/secret rotation flow"
      - "deploy.sh used set -e only — must mirror T2 fix"

tier_promotion_rule: "A bug discovered in any tier is fixed in T1 first (or recorded as a T2/T3 deviation); then ported forward T1 → T2 → T3. Never patch T2/T3 in a way that masks a T1 defect."

# Recorded deviations from T1 behavior (each must justify itself)
tier_deltas: []

# ──────────────────────────────────────────────────────────────
# ROADMAP — evaluation_pending
# Items on the radar but not adopted. Honest status only.
# ──────────────────────────────────────────────────────────────
roadmap:
  evaluation_pending:
    positron:
      status: "EVALUATION_PENDING"
      scope: "T2 (docker) and T3 (k8s) only"
      trigger_condition: "Adopt only if it demonstrably resolves a known T1 host-tier issue (RStudio Server rsession crashes, NIMBLE workload memory pressure, BLAS thread collision, or session-restore Error code 4). Until then: do not propose, do not configure."
      do_not: "Add Positron-specific files, dependencies, or rules until trigger_condition is met."

# ──────────────────────────────────────────────────────────────
# CANONICAL PATHS / IGNORE GLOBS
# What the agent should treat as authoritative vs. orphan/legacy.
# generate.sh emits .aiignore from ignore_globs.
# ──────────────────────────────────────────────────────────────
canonical_paths:
  plan: "plan/implementation_plan_v9.6_final.md"
  rprofile_site: "templates/Rprofile_site.R.template"
  agents_doc: ".ai/agents.md"
  project_yaml: ".ai/project.yml"

ignore_globs:
  - "archive/**"
  - "Infra-Iam-PKI.backup/**"
  - "**/*_original"
  - "**/* copy*"
  - "**/*.legacy_v*_rollback"
  - "**/legacy_*"
  - "src/biome_core_rust/**"

# ──────────────────────────────────────────────────────────────
# SUBMODULES — sibling repos referenced from this repo
# Only listed if the agent must know they exist.
# ──────────────────────────────────────────────────────────────
submodules:
  infra_iam_pki:
    path: "Infra-Iam-PKI/"
    role: "Sibling project (Keycloak IdP + step-ca PKI + Open OnDemand). Will later integrate this RStudio deployment into its docker and kubernetes flows."
    rule: "Out of scope unless the task explicitly names it. Do NOT duplicate, edit, or cross-reference its files from R-studioConf code; route via its own README/CONFIGURATION.md."

# ──────────────────────────────────────────────────────────────
# HARD CONSTRAINTS
# These are the non-negotiable engineering rules.
# Each constraint has an ID, rule text, rationale, and a
# validation method (used by validate.sh to check compliance).
# ──────────────────────────────────────────────────────────────
constraints:
  - id: "HC-01"
    rule: "Every container MUST have deploy.resources.limits for both memory and cpus"
    rationale: "Prevents OOM cascades on shared hosts. RStudio and companion services must stay within deterministic limits."
    validate: "compose_has_resource_limits"

  - id: "HC-02"
    rule: "BIND MOUNTS only — zero named Docker volumes"
    rationale: "Named volumes are opaque, hard to backup, impossible to inspect."
    validate: "compose_no_named_volumes"

  - id: "HC-03"
    rule: "All scripts MUST begin with set -euo pipefail"
    rationale: "Fail-fast on undefined vars, pipe failures, any error."
    validate: "scripts_have_strict_mode"

  - id: "HC-04"
    rule: "Passwords MUST be written to files — never passed as CLI arguments"
    rationale: "Prevents leakage in ps aux, /proc/*/cmdline, Docker inspect, shell history."
    validate: "no_password_cli_args"

  - id: "HC-05"
    rule: "PostgreSQL ports are NEVER exposed to the host"
    rationale: "DB is internal-only. Accessed via Docker network."
    validate: "compose_no_db_ports"

  - id: "HC-06"
    rule: "All Dockerfiles bake dependencies at build time — no runtime package installation"
    rationale: "Eliminates runtime failures if package mirrors are offline. Immutable containers."
    validate: "no_runtime_pkg_install"

  - id: "HC-07"
    rule: "Pin ALL upstream image versions — no :latest tag"
    rationale: "Reproducible builds. Version drift between components causes silent failures."
    validate: "compose_no_latest_tags"

  - id: "HC-08"
    rule: ".env files are NEVER committed to git"
    rationale: "Contains passwords, tokens, fingerprints."
    validate: "gitignore_has_env"

  - id: "HC-09"
    rule: "The renewer container NEVER mounts /var/run/docker.sock directly"
    rationale: "Full host control = container escape vector. Use docker-socket-proxy."
    validate: "compose_no_docker_sock"

  - id: "HC-10"
    rule: "Deploy scripts MUST exit 1 if chown/permission setup fails"
    rationale: "Prevents cryptic Permission Denied errors deep in container logs."
    validate: "deploy_scripts_check_chown"

  - id: "HC-11"
    rule: "No external CDN calls for fonts or CSS in UI themes"
    rationale: "Airgap/Zero-Trust requirement."
    validate: "no_external_cdn"

  - id: "HC-12"
    rule: "Use jq for JSON manipulation — never sed/awk on JSON"
    rationale: "sed breaks on special chars, no schema validation."
    validate: "no_sed_on_json"

  - id: "HC-13"
    rule: "Adapt the system to portable user R code — never silently patch user scripts"
    rationale: |
      The system (Renviron.site, Rprofile_site fragments, dispatcher options,
      cgroup, BLAS/OMP/GDAL caps, NFS mount options, clean-VM baseline) MUST
      be adjusted to keep portable user R code working. Sysadmins exhaust
      this L0..L4 ladder before proposing any user-script edit; AI-generated
      output that rewrites a user-supplied .R file without explicit consent
      in the same prompt is INVALID. Triage scripts MUST emit a verdict line
      naming the responsible layer (L0 OS, L1 pure-R, L2 fragment, L3 full
      profile, L4 clean-VM, L5 user-script-or-upstream) so reports remain
      defensible when handed back to the user.

      ORDERING INVARIANT (added 2026-05-09):
      A user-script modification suggestion is admissible ONLY AFTER triage
      has positively excluded ALL of the following surfaces, IN ORDER:
        1. SYSTEM bug   — L0 OS/NFS/fork/cgroup/kernel/BLAS infrastructure
        2. CONFIG bug   — L1 Renviron, L2 Rprofile fragment, L3 dispatcher
        3. UNCHECKED case — L4 clean-VM baseline reproduces (no NFS, no
                            domain, no profile), AND a ≤30-line minimal
                            reproducer with sessionInfo() + kernel-stack
                            evidence has been captured.
      Skipping any of (1), (2), (3) before suggesting that the user edit
      their .R file is a HC-13 violation. AI output that proposes a user
      patch without citing the layer it cleared (e.g. "L4 PASS, evidence
      at <path>") MUST be rejected on review. The verdict line of the
      triage harness is the auditable proof that the ordering was followed.
    validate: "docs_have_responsibility_boundaries"

  - id: "HC-14"
    rule: "RPROFILE_VERSION bumps MUST land with matching CHANGELOG section + cross-doc references in the same commit"
    rationale: |
      The Rprofile_site dispatcher and its fragments are the highest-blast-radius
      surface in the project: a silent kernel bump (e.g. v12.2 → v12.4 skipping
      v12.3) leaves the byte-compiled bundle path, new fragments, and new
      env-var bypasses undocumented — operators discover features only by
      reading the source. v12.3 ("byte-compiled fragment bundle fast-path")
      shipped without a CHANGELOG entry and was found only when documenting
      v12.4 — exactly the failure mode this rule prevents.

      RULE (enforced by Makefile + pre-commit hook):
        1. Every change to `config/setup_nodes.vars.conf :: RPROFILE_VERSION`
           MUST be accompanied, in the same commit, by a `## v<N> (YYYY-MM-DD) — "<headline>"`
           section in `docs/reference/Rprofile_site.CHANGELOG.md` covering
           CONTEXT, ARCHITECTURE, WHAT CHANGED, VERIFICATION, ROLLBACK, TIER DELTAS.
        2. New deploy artefacts (e.g. `.compiled/`, `.bundle.Rc`, new fragments
           in `templates/Rprofile_site.d/`) MUST be cross-referenced from
           `docs/reference/CONFIGURATION_MAP.md §3`,
           `docs/deployment/CONFIGURATION_REFERENCE.md §3`, and
           `docs/reference/SCRIPT_CATALOG.md` row of the owning script.
        3. T2/T3 status MUST be recorded in the new CHANGELOG entry's
           "TIER DELTAS" section, even if "pending — to be ported".

      ENFORCEMENT:
        - `make audit` extracts `RPROFILE_VERSION` from `config/setup_nodes.vars.conf`
          and greps for `^## v${VER}` in `docs/reference/Rprofile_site.CHANGELOG.md`.
          Mismatch → exit 1.
        - `.ai/hooks/pre-commit` detects an `RPROFILE_VERSION=` line change in
          the staged diff; if no matching CHANGELOG section is staged, it
          appends a stub `## v<N> (TBD) — "TODO"` block and aborts the commit
          so the operator cannot forget.

      EXCLUSIONS: documentation-only patch releases (e.g. `12.4.1` typo fix in
      a comment) MAY skip the runbook in `docs/operations/UPGRADE_TO_*.md` but
      still require a `### v12.4.1` sub-section in the CHANGELOG.
    validate: "rprofile_version_has_changelog_entry"

  - id: "HC-15"
    rule: "R/RStudio version and default R configuration must dynamically map to single-source-of-truth files (config/r_env_manager.conf, configmaps.yaml) and no AI agent should suggest overriding them implicitly."
    rationale: "Ensures consistent R/RStudio versions across all deployment tiers and AI configurations by enforcing dynamic mapping to canonical configuration files. Prevents implicit overrides that could lead to version drift and silent failures."
    validate: "ai_config_respects_version_sources"

# ──────────────────────────────────────────────────────────────
# COMPOSE FORMAT RULES
# ──────────────────────────────────────────────────────────────
compose_rules:
  syntax: "Docker Compose v2 — NO version: key"
  command: "docker compose (space) — NOT docker-compose (hyphen)"
  required_sections:
    - "deploy.resources.limits"
    - "healthcheck (for stateful services)"
    - "logging (json-file with anchored config)"
    - "labels (watchtower enable)"
    - "depends_on (with condition)"

# ──────────────────────────────────────────────────────────────
# SCRIPT BEHAVIORAL CATEGORIES
# Container-internal scripts MUST NEVER use interactive input.
# This list is manually maintained because the distinction is
# semantic (how the script is called), not syntactic.
# ──────────────────────────────────────────────────────────────
script_categories:
  container_internal:
    description: "Run inside Docker containers without TTY. NEVER use read -p."
    scripts: []

  operator_interactive:
    description: "Run by sysadmin on host. May use interactive input."
    scripts:
      - "scripts/01_optimize_system.sh"
      - "scripts/02_configure_time_sync.sh"
      - "scripts/03_install_secure_access.sh"
      - "scripts/10_join_domain_sssd.sh"
      - "scripts/11_join_domain_samba.sh"
      - "scripts/12_lib_kerberos_setup.sh"
      - "scripts/15_setup_nginx_cleanup.sh"
      - "scripts/20_configure_rstudio.sh"
      - "scripts/30_install_nginx.sh"
      - "scripts/31_setup_web_portal.sh"
      - "scripts/32_setup_letsencrypt.sh"
      - "scripts/40_install_telemetry.sh"
      - "scripts/50_setup_nodes.sh"
      - "scripts/21_helper_rstudio_version.sh"

  client_portable:
    description: "Copied to remote hosts. Self-contained."
    scripts: []

# ──────────────────────────────────────────────────────────────
# KNOWN BUGS / TECH DEBT
# Do NOT fix without explicit instruction.
# ──────────────────────────────────────────────────────────────
known_issues:
  - id: "KI-01"
    component: "sandbox"
    severity: "high"
    description: "Vagrant/libvirt sandbox is BROKEN. Do not use for validation."
    workaround: "User testing + researcher testing against production host."
  - id: "KI-02"
    component: "src/biome_core_rust"
    severity: "info"
    description: "Rust core library evaluated but DORMANT. Does not measurably speed up R code loading."
    workaround: "Do not activate. Use existing shell/R toolchain."

# ──────────────────────────────────────────────────────────────
# BRANDING
# ──────────────────────────────────────────────────────────────
branding:
  primary_color: "#C80E0F"
  primary_name: "Unibo Red"
  secondary_color: "#2C3E50"
  secondary_name: "BiGeA Gray"
  dark_variant: "#9A0B0B"
  font_stack: "system-ui, -apple-system, sans-serif"
  font_alternative: "Inter (bundled locally, never CDN)"
  style: "Glassmorphism (backdrop-filter, rgba backgrounds)"
  reference_site: "https://bigea.unibo.it/it"
  cdn_policy: "FORBIDDEN — all assets must be local/bundled"

# ──────────────────────────────────────────────────────────────
# R RUNTIME
# Non-extractable architectural decisions for R environment.
# These CANNOT be inferred from compose/Dockerfiles — maintain here.
# ──────────────────────────────────────────────────────────────
r_runtime:
  version_management: "Dynamically managed via config/r_env_manager.conf and kubernetes-deploy/configmaps.yaml. Upgrades MUST alter these configs, not deployment code directly."
  blas:
    package: "libopenblas0-serial"
    banned: "libopenblas0-pthread" # causes SIGSEGV with rsession pthread collision
    detection_script: "/etc/profile.d/biome-coretype.sh"
    rationale: "Serial BLAS has no internal thread pool. Eliminates thread contention with RStudio rsession."
  tmp_storage:
    path: "/Rtmp"
    size_gb: 400
    fstype: "ext4"
    replaces: "tmpfs at /tmp (16G RAM-based — OOM on NIMBLE workloads)"
    validated_by: "50_setup_nodes.sh Step 5"
  config:
    modular_dir: "/etc/biome-calc/profile.d/"
    loader: "/etc/R/Rprofile.site" # thin loader that sources profile.d/*.R
    template: "templates/Rprofile_site.R.template"
    deployed_by: "50_setup_nodes.sh"
    audit_template: "templates/00_audit_v27.R.template"
  workloads:
    - "NIMBLE MCMC (Bayesian hierarchical models)"
    - "Geospatial analysis (sf, terra, raster)"
    - "Large-scale matrix statistics (OpenBLAS)"
  session_resilience:
    nginx_proxy_read_timeout: "extended for long-running R sessions"
    nginx_client_max_body_size: "extended for large workspace payloads (100MB+)"
    crash_pattern: "Error code 4 — browser OOM from massive session state"
    forensics_script: "scripts/99_postmortem_forensics.sh"

# ──────────────────────────────────────────────────────────────
# SANDBOX TOPOLOGY
# STATUS: BROKEN — do not use for validation
# ──────────────────────────────────────────────────────────────
sandbox:
  status: "BROKEN"
  provider: "Vagrant + libvirt/KVM"
  network: "192.168.56.0/24"
  testing_protocol: "user testing + researcher testing against production host"
  hosts:
