apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: botanical-ingress
  namespace: botanical
  annotations:
    # Use Traefik (RKE2 default) or Nginx ingress
    # We specify SSL passthrough because the internal Nginx portal requires SSL
    traefik.ingress.kubernetes.io/router.tls: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
  - host: botanical.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-portal
            port:
              number: 443
  tls:
  - hosts:
    - botanical.example.com
    secretName: botanical-tls-cert # Auto-generated by cert-manager
