apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rstudio-home-pvc
  namespace: botanical
spec:
  # Using standard storage class (e.g. nfs-client or longhorn)
  # This replaces the host bind mount for /home
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rstudio-projects-pvc
  namespace: botanical
spec:
  # This replaces the host bind mount for /nfs/home
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rstudio-python-venv-pvc
  namespace: botanical
spec:
  # Replaces the host bind mount for /opt/r-geospatial
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-storage-pvc
  namespace: botanical
spec:
  # This replaces the host bind mount for /var/lib/ollama and emptyDir
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
