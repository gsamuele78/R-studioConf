apiVersion: v1
kind: Secret
metadata:
  name: rstudio-secrets
  namespace: botanical
type: Opaque
stringData:
  # Placeholder for Step-CA Token and PKI trust info
  # These should be managed via SOPS / External Secrets in production
  STEP_TOKEN: "placeholder-token"
  STEP_FINGERPRINT: "placeholder-fingerprint"
  
  # Optional AD Bind Account if winbind requires explicit domain join credentials
  # Note: The sidecar might use a keytab instead.
  AD_JOIN_USER: "admin"
  AD_JOIN_PASS: "password123"
