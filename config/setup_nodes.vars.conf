# =============================================================================
# CONTACT / BRANDING
# =============================================================================

# Contact email shown in Rprofile welcome and audit reports
BIOME_CONTACT="Lifewatch_Biome_internal@live.unibo.it"

# Rprofile version label (shown in welcome banner and status())
RPROFILE_VERSION="12.8"

# =============================================================================
# LOCAL R LIBRARY DISK (v12.4) — moves R_LIBS_USER off NFS
# =============================================================================
# Per-VM local storage for compiled R packages. Eliminates the NFS lookup-storm
# triggered by N PSOCK workers calling library() simultaneously.
# Layout on disk: /var/lib/biome-Rlibs/<USER>/<R version>/
# User scripts, RData, results stay on NFS — only compiled .so move local.
# Hard-rule compliance: 14 (chown failure → exit 1), portability preserved.

# Master toggle. When false, R_LIBS_USER stays at the NFS default (~/R/...).
ENABLE_R_LIBS_LOCAL=true

# v12.6: pre-create per-user lib dirs (R_LIBS_LOCAL_ROOT/<user>/<R-ver>) for
# every existing AD/local user (UID >= 1000, excluding nobody=65534) at
# deploy time. Eliminates the "lib not writable, use personal library?"
# prompt at first install.packages().
# v12.8 fix: gate widened from [1000..64999] to [>=1000 && !=65534]. The
# previous ceiling silently excluded SSSD/Samba AD users (SID-mapped UIDs
# 100M+); they got NFS-only .libPaths() until logout/login + manual chown.
# New users (added after deploy) are covered automatically by the runtime
# Rprofile fragment 04_user_lib_bootstrap.R at their first R startup
# (also fixed in v12.8: now reads RAW R_LIBS_USER instead of the silently
# filtered .libPaths()[1]).
ENABLE_R_LIBS_LOCAL_WARMUP=true

# Mount point that gets exposed to R sessions as R_LIBS_USER.
R_LIBS_LOCAL_ROOT="/var/lib/biome-Rlibs"

# Optional dedicated block device. When non-empty AND the device exists,
# scripts/50_setup_nodes.sh will (idempotently) format and mount it at
# R_LIBS_LOCAL_ROOT, adding an /etc/fstab entry. When empty (default), the
# directory is created on the VM root filesystem — safe but consumes root-fs
# space (size dimensioned via R_LIBS_LOCAL_SIZE_GB hint only).
#
# Proxmox sysadmin path (per-VM, attach virtio disk in GUI):
#   - 80GB virtio attached as scsi1 → guest sees /dev/sdb (or /dev/vdb)
#   - Set this var to the resulting device path on the guest:
#       R_LIBS_LOCAL_DEVICE="/dev/sdb"
#   - Re-run sudo bash scripts/50_setup_nodes.sh; setup_local_rlibs() is idempotent.
R_LIBS_LOCAL_DEVICE=""

# Filesystem to format the dedicated device with (only used if R_LIBS_LOCAL_DEVICE set)
R_LIBS_LOCAL_FSTYPE="ext4"

# Advisory size hint shown in /var/log/biome-log/r_biome_system.log when
# the directory is on the root fs (no enforcement). Used by audit reports.
R_LIBS_LOCAL_SIZE_GB=80

# =============================================================================
# NFS MOUNT AUDIT (v12.4) — audit-only, never remount automatically
# =============================================================================
# Variables checked by audit_nfs_mounts() in scripts/50_setup_nodes.sh
# Logs WARN if the active mount options are missing recommended values.
# Sysadmin must edit /etc/fstab manually (NFS remount = production risk).
NFS_AUDIT_REQUIRE_NCONNECT_MIN=4    # log WARN if nconnect < this
NFS_AUDIT_REQUIRE_VERS_MIN="4.1"     # log WARN if vers < this
NFS_AUDIT_HINT_LOOKUPCACHE_ALL=true  # suggest lookupcache=all if currently positive

