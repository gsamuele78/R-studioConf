# ==============================================================================
# pin_r_version.vars.conf
# ==============================================================================
# Configuration variables for pin_r_version.sh
#
# APT_PREFERENCES_FILE : Path where the apt preferences file is written.
#
# R_CORE_PACKAGES      : Space-separated list of R interpreter packages to pin
#                        to the exact R release version (e.g. 4.6.0*).
#                        IMPORTANT: Only include packages whose version numbers
#                        match the R release string. DO NOT add r-cran-* here —
#                        CRAN packages use their own upstream versioning and are
#                        handled in a separate APT preferences stanza.
#
# DEFAULT_R_VERSION    : The R version pinned by menu option 2.
#                        Format: major.minor.patch (e.g. 4.6.0) — no Debian suffix.
# ==============================================================================

APT_PREFERENCES_FILE="/etc/apt/preferences.d/r-base"

# Core R interpreter packages — these share the R version space.
R_CORE_PACKAGES="r-base r-base-core r-base-dev r-recommended"

# The canonical deployed R version for this cluster.
DEFAULT_R_VERSION="4.6.0"
