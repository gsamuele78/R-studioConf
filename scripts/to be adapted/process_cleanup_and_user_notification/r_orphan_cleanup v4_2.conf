# ============================================================================
# r_orphan_cleanup.conf v4.2
# Configurazione centralizzata per il sistema di cleanup worker R orfani
# Posizione: /usr/local/custom/rstudio/conf/r_orphan_cleanup.conf
#
# Per BIOME-CALC - 137.204.21.170
# ============================================================================

# ── Email Utility ─────────────────────────────────────────────
SEND_EMAIL_SCRIPT="/usr/local/custom/rstudio/script/send_email.sh"

# ── SMTP ──────────────────────────────────────────────────────
SMTP_HOST="smtprelay.unibo.it"
SMTP_PORT="25"
SENDER_EMAIL="biome-calc@personale.dir.unibo.it"

# ── DNS ───────────────────────────────────────────────────────
DNS_SERVERS="137.204.25.71,137.204.25.77,8.8.8.8"

# ── Dominio email utenti ─────────────────────────────────────
MAIL_DOMAIN="studio.unibo.it"

# ── Destinatari admin ─────────────────────────────────────────
#
# Tre modalita' supportate:
#
# 1) File con lista destinatari (CONSIGLIATA per gruppi Teams):
#    ADMIN_EMAIL="file:///usr/local/custom/rstudio/conf/admin_recipients.txt"
#    Il file supporta commenti (#) e righe vuote.
#
# 2) Lista diretta separata da virgola:
#    ADMIN_EMAIL="admin1@unibo.it,admin2@unibo.it"
#
# 3) Indirizzo singolo (solo se il gruppo accetta email esterne):
#    ADMIN_EMAIL="Lifewatch_Biome_internal@live.unibo.it"
#
ADMIN_EMAIL="file:///usr/local/custom/rstudio/conf/admin_recipients.txt"

# ── Percorsi log ──────────────────────────────────────────────
LOG_DIR="/var/log/r_orphan_cleanup"
LOG_FILE="${LOG_DIR}/cleanup.log"
NOTIFY_DIR="${LOG_DIR}/notifications"

# ── Soglie ────────────────────────────────────────────────────
MIN_AGE_SECONDS=120
MAX_LOG_SIZE=$((10 * 1024 * 1024))

# ── Kill timeout ────────────────────────────────────────────────────
KILL_TIMEOUT=30


# ── Pattern processi da monitorare ────────────────────────────
ORPHAN_PATTERNS=(
    "parallel:::.workRSOCK|parallel::PSOCK"
    "parallel:::.slaveRSOCK|parallel::PSOCK (legacy)"
    "parallelly:::.workRSOCK|future::multisession"
    "parallelly:::|future::parallelly"
    "callr::r_bg|callr::r_bg"
    "callr::r_session|callr::r_session"
    "BiocParallel|BiocParallel"
    "clustermq|clustermq"
    "batchtools|batchtools"
    "snowSOCK\|snowRSOCK|snow (legacy)"
    "python.*tensorflow|tensorflow (Python)"
    "python.*keras|keras (Python)"
    "python.*earthengine|rgee/earthengine (Python)"
    "python.*torch|PyTorch (Python)"
    "python.*ee_utils|rgee (Python)"
    "python.*reticulate|reticulate (Python generico)"
    "gdal|GDAL subprocess"
    "ogr2ogr|OGR subprocess"
    "Rscript.*worker|Rscript worker (generico)"
)

# ── Pattern esclusioni ────────────────────────────────────────
EXCLUDE_PATTERNS=(
    "jupyter"
    "code-server"
    "rstudio-server"
    "rserver"
    "rsession"
)
