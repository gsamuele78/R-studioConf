# ── Soglie ────────────────────────────────────────────────────
MIN_AGE_SECONDS=120
MAX_LOG_SIZE=$((10 * 1024 * 1024))  # 10MB

# ── Pattern processi da monitorare ────────────────────────────
# Ogni riga: "GREP_PATTERN|LABEL_FRIENDLY"
#
# CATEGORIA 1: Worker R nativi (PSOCK, snow, callr)
# CATEGORIA 2: Python via reticulate (tensorflow, keras, rgee, etc.)
# CATEGORIA 3: R via Rscript (clustermq, batchtools, snow legacy)
#
# Per aggiungere un nuovo pattern, aggiungi una riga.
# Il GREP_PATTERN viene usato in grep -E sul comando del processo.
# Il LABEL_FRIENDLY viene mostrato nei log e nelle notifiche.

ORPHAN_PATTERNS=(
    # ── Worker R PSOCK ────────────────────────────────────────
    "parallel:::.workRSOCK|parallel::PSOCK"
    "parallel:::.slaveRSOCK|parallel::PSOCK (legacy)"
    "parallelly:::.workRSOCK|future::multisession"
    "parallelly:::|future::parallelly"

    # ── callr / targets ──────────────────────────────────────
    "callr::r_bg|callr::r_bg"
    "callr::r_session|callr::r_session"

    # ── BiocParallel ──────────────────────────────────────────
    "BiocParallel|BiocParallel"

    # ── clustermq (ZeroMQ workers) ────────────────────────────
    "clustermq|clustermq"

    # ── batchtools ────────────────────────────────────────────
    "batchtools|batchtools"

    # ── snow (legacy) ─────────────────────────────────────────
    "snowSOCK\|snowRSOCK|snow (legacy)"

    # ── Python via reticulate (tensorflow, keras, rgee, etc.) ─
    # Questi sono processi python3/python spawnati da rsession
    # via reticulate. ATTENZIONE: matchano solo se il comando
    # contiene la keyword specifica.
    "python.*tensorflow|tensorflow (Python)"
    "python.*keras|keras (Python)"
    "python.*earthengine|rgee/earthengine (Python)"
    "python.*torch|PyTorch (Python)"
    "python.*ee_utils|rgee (Python)"

    # ── Reticulate generico ───────────────────────────────────
    # Cattura tutti i Python spawnati da R che non matchano
    # i pattern specifici sopra. Richiede verifica parent chain.
    "python.*reticulate|reticulate (Python generico)"

    # ── GDAL/OGR subprocesses (da sf, terra, rgdal) ──────────
    "gdal|GDAL subprocess"
    "ogr2ogr|OGR subprocess"

    # ── Generic Rscript workers ───────────────────────────────
    # Catch-all per Rscript spawnati come worker.
    # Deve essere l'ULTIMO pattern (bassa priorità).
    "Rscript.*worker|Rscript worker (generico)"
)

# ── Pattern esclusioni ────────────────────────────────────────
# Processi che matchano i pattern sopra ma NON devono essere killati.
# Esempio: jupyter notebook, processi di sistema, etc.
EXCLUDE_PATTERNS=(
    "jupyter"
    "code-server"
    "rstudio-server"
    "rserver"
    "rsession"
)
